name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Publish single-file executable
        run: >
          dotnet publish .\BodyCamProcessor\BodyCamProcessor.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -o .\artifacts\BodyCamProcessor-win-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BodyCamProcessor-win-x64
          path: artifacts/BodyCamProcessor-win-x64/**
