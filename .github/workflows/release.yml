name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Publish single-file executable
        run: >
          dotnet publish .\BodyCamProcessor\BodyCamProcessor.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -o .\artifacts\BodyCamProcessor-win-x64

      - name: Package release asset
        run: >
          Compress-Archive
          -Path .\artifacts\BodyCamProcessor-win-x64\*
          -DestinationPath .\artifacts\BodyCamProcessor-win-x64.zip
          -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: BodyCamProcessor-win-x64
          path: artifacts/BodyCamProcessor-win-x64.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/BodyCamProcessor-win-x64.zip
