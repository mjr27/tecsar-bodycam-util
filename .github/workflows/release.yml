name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    env:
      PACKAGE_NAME: BodyCamProcessor-win-x64-${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v0.0.0-local' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Resolve version
        shell: pwsh
        run: |
          if ("${{ startsWith(github.ref, 'refs/tags/') }}" -eq "true") {
            $versionTag = "${{ github.ref_name }}"
            $semver = $versionTag.TrimStart("v")
            $fileVersion = "$semver.0"
          } else {
            $versionTag = "v0.0.0-local"
            $semver = "0.0.0-local"
            $fileVersion = "0.0.0.0"
          }

          "VERSION_TAG=$versionTag" >> $env:GITHUB_ENV
          "SEMVER=$semver" >> $env:GITHUB_ENV
          "FILE_VERSION=$fileVersion" >> $env:GITHUB_ENV

      - name: Publish single-file executable
        run: >
          dotnet publish .\BodyCamProcessor\BodyCamProcessor.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:Version=$env:SEMVER
          -p:AssemblyVersion=$env:FILE_VERSION
          -p:FileVersion=$env:FILE_VERSION
          -p:InformationalVersion=$env:VERSION_TAG
          -o .\artifacts\BodyCamProcessor-win-x64

      - name: Package release asset
        run: >
          Compress-Archive
          -Path .\artifacts\BodyCamProcessor-win-x64\*
          -DestinationPath ".\artifacts\${{ env.PACKAGE_NAME }}.zip"
          -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: artifacts/${{ env.PACKAGE_NAME }}.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/${{ env.PACKAGE_NAME }}.zip
